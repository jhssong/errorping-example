<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ErrorPing REST API Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 30px;
        }
        button {
            margin: 6px 0;
            padding: 6px 12px;
            cursor: pointer;
        }
        /* 로그 창 디자인 개선 (스크롤 추가) */
        pre {
            background: #111;
            color: #0f0;
            padding: 16px;
            margin-top: 20px;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
            border-radius: 8px;
        }
        .log-entry {
            margin-bottom: 20px;
            border-bottom: 1px dashed #444;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>ErrorPing REST API 테스트</h1>

<button onclick="postMethodNotSupported()">
    HttpRequestMethodNotSupportedException (405)
</button>

<button onclick="getIllegalArgument()">
    IllegalArgumentException (500)
</button>

<button onclick="postValidationError()">
    MethodArgumentNotValidException (400)
</button>

<button onclick="getTypeMismatch()">
    MethodArgumentTypeMismatchException (400)
</button>

<button onclick="postRuntimeException()">
    RuntimeException
</button>

<pre id="result">대기중...</pre>

<script>
    async function request(url, options = {}) {
        const method = options.method || 'GET';

        try {
            const res = await fetch(url, options);
            const contentType = res.headers.get("content-type");
            let body;

            // JSON 응답이면 파싱, 아니면 텍스트로 처리
            if (contentType && contentType.includes("application/json")) {
                body = await res.json();
            } else {
                body = await res.text();
            }

            // 로그에 찍힐 데이터 객체 생성
            const logData = {
                status: res.status,
                headers: Object.fromEntries(res.headers.entries()),
                body: body
            };

            // 화면에 로그 추가하기
            appendLog(method, url, logData);

        } catch (e) {
            // 네트워크 에러(서버 꺼짐 등) 처리
            appendLog(method, url, { error: e.toString() });
        }
    }

    // 화면에 로그를 누적해서 찍어주는 함수
    function appendLog(method, url, data) {
        const resultEl = document.getElementById("result");

        // 처음 '대기중...' 글자 지우기
        if (resultEl.textContent === "대기중...") {
            resultEl.textContent = "";
        }

        const time = new Date().toLocaleTimeString();
        const newLog = `[${time}] 요청: ${method} ${url}\n${JSON.stringify(data, null, 2)}\n\n`;
        const separator = "---------------------------------------------------\n\n";

        resultEl.textContent = newLog + separator + resultEl.textContent;
    }

    function postMethodNotSupported() {
        request("/test/method", { method: "POST" });
    }

    function getIllegalArgument() {
        request("/test/illegal?name=bad");
    }

    function postValidationError() {
        request("/test/validation", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: "invalid-email" }) // 고의로 잘못된 이메일 전송
        });
    }

    function getTypeMismatch() {
        request("/test/type/abc"); // 숫자가 들어가야 할 곳에 문자를 넣음
    }

    function postRuntimeException() {
        request("/test/runtime", { method: "POST" });
    }
</script>

</body>
</html>
